# ── .mockery.yaml ──
# Mockery config for VCS-SMS
# Usage: mockery

with-expecter: true
packages:
  github.com/vcs-sms/auth-service/internal/repository:
    config:
      dir: "{{.InterfaceDir}}/mocks"
      filename: "{{.InterfaceName}}_mock.go"
      outpkg: "mocks"
    interfaces:
      UserRepository:
  github.com/vcs-sms/server-service/internal/repository:
    config:
      dir: "{{.InterfaceDir}}/mocks"
      filename: "{{.InterfaceName}}_mock.go"
      outpkg: "mocks"
    interfaces:
      ServerRepository:
  github.com/vcs-sms/monitor-service/internal/repository:
    config:
      dir: "{{.InterfaceDir}}/mocks"
      filename: "{{.InterfaceName}}_mock.go"
      outpkg: "mocks"
    interfaces:
      HealthCheckConfigRepo:
      ServerReader:
      ESStatusLogRepo:
  github.com/vcs-sms/monitor-service/internal/checker:
    config:
      dir: "{{.InterfaceDir}}/mocks"
      filename: "{{.InterfaceName}}_mock.go"
      outpkg: "mocks"
    interfaces:
      HealthChecker:
  github.com/vcs-sms/shared/kafka:
    config:
      dir: "{{.InterfaceDir}}/mocks"
      filename: "{{.InterfaceName}}_mock.go"
      outpkg: "mocks"
    interfaces:
      Producer:
      Consumer:
